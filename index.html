<!DOCTYPE html>

<body>
    <!DOCTYPE html>
<html>
<head>
    <title>My Custom Google Search</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; padding-top: 50px; }
        .search-box { border: 1px solid #dfe1e5; padding: 10px 20px; border-radius: 24px; width: 400px; }
        button { padding: 10px; cursor: pointer; border-radius: 4px; border: 1px solid #ccc; }
    </style>
</head>
<body>

    <form action="https://www.google.com/search" method="GET">
        
        <input type="text" name="q" placeholder="Search Google..." class="search-box" required>
        
        <button type="submit">Google Search</button>
        
    </form>

</body>
</html>
</body>
</html>
